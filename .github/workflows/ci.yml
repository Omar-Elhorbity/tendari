name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (runtime + dev)
        run: pip install -e ".[dev]"
      - name: Run tests
        # DB-free unit suite — mock provider + fake sessions, no external services.
        run: pytest -q

  docker-build:
    name: Production image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build runtime image
        run: docker build -t tendari:ci .
